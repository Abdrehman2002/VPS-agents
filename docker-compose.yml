# Full single-VPS stack: Redis + LiveKit server + Caddy (TLS) + 3 voice agents.
# All on host networking so they talk over localhost and WebRTC UDP works.
#
# Fresh VPS:            docker compose up -d --build
# Restart all agents:   docker compose up -d --force-recreate nadia sara zara
# Restart one agent:    docker compose up -d --force-recreate sara

services:
  redis:
    image: redis:7-alpine
    network_mode: host
    command: redis-server --bind 127.0.0.1 --port 6379
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    network_mode: host
    command: --config /etc/livekit.yaml
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro
    restart: unless-stopped
    depends_on: [redis]

  caddy:
    image: caddy:2
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on: [livekit]

  nadia:
    build: .
    image: voice-agents:latest
    network_mode: host
    env_file: .env
    environment:
      AGENT_NAME: nadia
    command: ["python", "agent.py", "start"]
    restart: unless-stopped
    depends_on: [livekit]

  sara:
    image: voice-agents:latest
    network_mode: host
    env_file: .env
    environment:
      SARA_AGENT_NAME: sara
      WORKER_PORT: "8082"   # avoid collision with nadia (8081) on host network
    command: ["python", "sara.py", "start"]
    restart: unless-stopped
    depends_on: [livekit, nadia]

  zara:
    image: voice-agents:latest
    network_mode: host
    env_file: .env
    environment:
      ZARA_AGENT_NAME: zara
      WORKER_PORT: "8083"   # avoid collision with nadia (8081) and sara (8082)
    command: ["python", "zara.py", "start"]
    restart: unless-stopped
    depends_on: [livekit, nadia]

volumes:
  caddy_data:
  caddy_config:
